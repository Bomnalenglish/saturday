<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<style>

  body{font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .hdr{background:linear-gradient(135deg,#0c4a6e,#0ea5e9,#10b981);color:#fff;padding:16px 16px 12px;text-align:center;box-shadow:0 4px 16px rgba(14,165,233,.3);}
  .hdr h1{font-size:1.1rem;font-weight:800;}
  .hdr p{font-size:.73rem;opacity:.8;margin-top:3px;}
  
  .tabs{display:flex;flex-wrap:wrap;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07);}
  .tab{flex:1 1 70px;min-width:60px;padding:9px 3px;border:none;background:#fff;font-size:.64rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;line-height:1.3;text-align:center;transition:all .15s;}
  .tab.on[data-t="0"]{color:var(--c1);border-bottom-color:var(--c1);background:var(--c1l);}
  .tab.on[data-t="1"]{color:var(--c2);border-bottom-color:var(--c2);background:var(--c2l);}
  .tab.on[data-t="2"]{color:var(--c3);border-bottom-color:var(--c3);background:var(--c3l);}
  .tab.on[data-t="3"]{color:var(--c4);border-bottom-color:var(--c4);background:var(--c4l);}
  .panel{display:none;padding:13px 11px 90px;}
  .panel.on{display:block;}
  .sbar{background:#fff;border-radius:12px;padding:12px 15px;margin-bottom:13px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
  .sbar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
  .snum{font-size:1.05rem;font-weight:800;}.snum span{font-size:.72rem;font-weight:500;color:var(--muted);}
  .spct{font-size:.72rem;color:var(--muted);}
  .bout{height:8px;background:var(--border);border-radius:99px;overflow:hidden;}
  .bin{height:100%;border-radius:99px;transition:width .4s;width:0;}
  .p0 .bin{background:linear-gradient(90deg,var(--c1),#38bdf8);}
  .p1 .bin{background:linear-gradient(90deg,var(--c2),#34d399);}
  .p2 .bin{background:linear-gradient(90deg,var(--c3),#fbbf24);}
  .p3 .bin{background:linear-gradient(90deg,var(--c4),#f87171);}
  .sdet{font-size:.7rem;color:var(--muted);margin-top:5px;}
  .omrbox{background:#fff;border-radius:13px;padding:13px 11px;box-shadow:0 1px 5px rgba(0,0,0,.07);margin-bottom:11px;}
  .omrbox h3{font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--border);}
  .orow{display:flex;align-items:flex-start;padding:6px 0;border-bottom:1px solid #f8fafc;gap:5px;}
  .orow:last-child{border-bottom:none;}
  .qlbl{width:24px;font-size:.7rem;font-weight:700;color:var(--muted);flex-shrink:0;text-align:right;padding-top:5px;}
  .ricon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;flex-shrink:0;background:var(--border);color:var(--muted);margin-top:3px;}
  .ricon.ok{background:var(--okl);color:var(--ok);}
  .ricon.ng{background:var(--ngl);color:var(--ng);}
  .chs{display:flex;gap:5px;flex-wrap:wrap;padding-top:2px;}
  .cb{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:#fafafa;font-size:.82rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;}
  .cb:hover:not(:disabled){border-color:#93c5fd;background:#eff6ff;}
  .cb.sel{border-color:#3b82f6;background:#dbeafe;color:#1d4ed8;}
  .cb.sel.ok{border-color:var(--ok);background:var(--okl);color:var(--ok);}
  .cb.sel.ng{border-color:var(--ng);background:var(--ngl);color:var(--ng);}
  .cb:disabled{cursor:default;}
  .tfw{display:flex;gap:5px;padding-top:2px;}
  .multi-note{font-size:.65rem;font-weight:700;color:#7c3aed;margin-bottom:3px;}
  .sw{display:flex;gap:5px;align-items:center;flex:1;}
  .si{flex:1;min-width:0;padding:5px 7px;border:1.5px solid var(--border);border-radius:7px;font-size:.75rem;outline:none;}
  .si:focus{border-color:#3b82f6;}
  .si.ok{border-color:var(--ok);background:var(--okl);}
  .si.ng{border-color:var(--ng);background:var(--ngl);}
  .si:disabled{cursor:default;}
  .gbtn{padding:5px 9px;border:none;border-radius:7px;background:#3b82f6;color:#fff;font-size:.7rem;font-weight:700;cursor:pointer;white-space:nowrap;}
  .gbtn:disabled{background:var(--muted);cursor:default;}
  .ma{display:flex;flex-direction:column;gap:3px;flex:1;padding-top:2px;}
  .mr{display:flex;gap:3px;flex-wrap:wrap;}
  .msub{padding:4px 9px;border:none;border-radius:7px;background:#7c3aed;color:#fff;font-size:.68rem;font-weight:700;cursor:pointer;width:fit-content;margin-top:2px;}
  .msub:disabled{background:var(--muted);cursor:default;}
  .smwrap{display:flex;flex-direction:column;gap:4px;flex:1;}
  .smrow{display:flex;gap:5px;align-items:center;}
  .smlbl{font-size:.65rem;font-weight:700;color:var(--muted);white-space:nowrap;min-width:28px;}
  .tf4wrap{display:flex;flex-direction:column;gap:5px;flex:1;padding-top:2px;}
  .tf4row{display:flex;gap:6px;align-items:center;}
  .tf4lbl{font-size:.65rem;font-weight:700;color:var(--muted);white-space:nowrap;min-width:28px;}
  .tf4btns{display:flex;gap:3px;}
  .fw{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:200;}
  .fb{padding:12px 30px;border:none;border-radius:28px;font-size:.85rem;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.2);transition:transform .15s;}
  .fb:hover{transform:translateY(-2px);}
  .fb[data-ft="0"]{background:linear-gradient(135deg,var(--c1),#38bdf8);}
  .fb[data-ft="1"]{background:linear-gradient(135deg,var(--c2),#34d399);}
  .fb[data-ft="2"]{background:linear-gradient(135deg,var(--c3),#fbbf24);}
  .fb[data-ft="3"]{background:linear-gradient(135deg,var(--c4),#f87171);}

  .ov.on{display:flex;}
  .mod{background:#fff;border-radius:18px;padding:26px 20px;max-width:310px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .me{font-size:2.6rem;margin-bottom:7px;}
  .mt{font-size:1.05rem;font-weight:800;margin-bottom:5px;}
  .ms{font-size:2.2rem;font-weight:900;margin:9px 0;}

  .mb{font-size:.77rem;color:var(--muted);margin-bottom:16px;}
  .mc{padding:10px 28px;border:none;border-radius:11px;background:#0ea5e9;color:#fff;font-size:.85rem;font-weight:700;cursor:pointer;}
  .attbar{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:9px;}
  .attbar span{font-size:.68rem;color:var(--muted);}

  .tab.on[data-t="4"]{color:var(--c1);border-bottom-color:var(--c1);background:var(--c1l);}
  .tab.on[data-t="5"]{color:var(--c2);border-bottom-color:var(--c2);background:var(--c2l);}
  .tab.on[data-t="6"]{color:var(--c3);border-bottom-color:var(--c3);background:var(--c3l);}

  .fb[data-ft="5"]{background:linear-gradient(135deg,var(--c2),#34d399);}
  .fb[data-ft="6"]{background:linear-gradient(135deg,var(--c3),#fbbf24);}

  .tch-note{font-size:.7rem;font-weight:700;color:#b45309;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:6px 9px;}

  .tch-ans b{color:#16a34a;margin-right:4px;}

  .wtab{background:#fff;border:2px solid var(--border);color:var(--muted);padding:7px 20px;border-radius:20px;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;}
  .wtab.on{border-color:var(--c1);color:var(--c1);background:var(--c1l);box-shadow:0 2px 8px rgba(14,165,233,.18);}

  .tab.on.k0{color:var(--c1);border-bottom-color:var(--c1);background:var(--c1l);}
  .tab.on.k1{color:var(--c2);border-bottom-color:var(--c2);background:var(--c2l);}

  .tab.on.k3{color:var(--c4);border-bottom-color:var(--c4);background:var(--c4l);}
  .bin.k0{background:linear-gradient(90deg,var(--c1),#38bdf8);}
  .bin.k1{background:linear-gradient(90deg,var(--c2),#34d399);}
  .bin.k2{background:linear-gradient(90deg,var(--c3),#fbbf24);}
  .bin.k3{background:linear-gradient(90deg,var(--c4),#f87171);}
  .fb.k0{background:linear-gradient(135deg,var(--c1),#38bdf8);}
  .fb.k1{background:linear-gradient(135deg,var(--c2),#34d399);}
  .fb.k2{background:linear-gradient(135deg,var(--c3),#fbbf24);}
  .fb.k3{background:linear-gradient(135deg,var(--c4),#f87171);}
  .multi-note{font-size:.65rem;font-weight:700;color:#7c3aed;margin-bottom:3px;}
</style>
</head>

function togMulti(t,i,n){

  const k=`${t}_${i}`; const arr=msel[k]||[]; msel[k]=arr;

    if(q.t==='mc'){
      const n=picks[t][i]; const corList=Array.isArray(q.a)?q.a:[q.a];
      '①②③④⑤'.split('').forEach((_,x)=>{ const b=document.getElementById(`cb${t}_${i}_${x+1}`); if(!b)return; b.disabled=true; b.classList.remove('sel'); if(corList.includes(x+1))b.classList.add('ok'); if(n!==undefined&&x+1===n&&!corList.includes(n))b.classList.add('ng'); });
      if(n!==undefined){ const ok=corList.includes(n); sub[t][i]=ok; if(ic){ic.textContent=ok?'O':'X'; ic.className='ricon '+(ok?'ok':'ng');} }
      else if(ic){ ic.textContent='-'; ic.className='ricon'; }
    } else if(q.t==='multi'){
      const sel=[...(msel[`${t}_${i}`]||[])].sort((a,b)=>a-b); const ans=[...q.a].sort((a,b)=>a-b); const has=sel.length>0; const ok=has&&JSON.stringify(sel)===JSON.stringify(ans);
      '①②③④⑤'.split('').forEach((_,x)=>{ const b=document.getElementById(`mc${t}_${i}_${x+1}`); if(!b)return; b.disabled=true; b.classList.remove('sel'); if(ans.includes(x+1))b.classList.add('ok'); if(sel.includes(x+1)&&!ans.includes(x+1))b.classList.add('ng'); });
      if(has){ sub[t][i]=ok; if(ic){ic.textContent=ok?'O':'X'; ic.className='ricon '+(ok?'ok':'ng');} }
      else if(ic){ ic.textContent='-'; ic.className='ricon'; }
    } else if(q.t==='tch'){
      const ta=document.getElementById(`ta${t}_${i}`); if(ta){ ta.style.display='block'; ta.innerHTML='<b>모범답안</b>'+esc(q.a); }
    }
  });
}

function submitTab(){
  const t=cur;
  if(submitted[t]){ showResult(); return; }
  const auto=autoTotal(t); const ans=countAnswered(t);
  if(auto>0 && ans===0){ alert('먼저 답을 입력해주세요!'); return; }
  if(auto>0 && ans<auto && !confirm('아직 '+(auto-ans)+'문항이 비어 있어요. 제출하고 채점할까요?')) return;
  submitted[t]=true;
  gradeTab(t);
  const att=parseInt(localStorage.getItem(keyS(t))||'0')+1; localStorage.setItem(keyS(t),att); document.getElementById('at'+t).textContent=att;
  saveState(t); updScore(t); updFloat(); showResult();
}

function updScore(t){
  const auto=autoTotal(t), tch=tchTotal(t), ans=countAnswered(t), correct=Object.values(sub[t]).filter(v=>v).length, g=submitted[t];
  const sn=document.getElementById('sn'+t);
  if(auto===0){ sn.innerHTML=`✍️ <span>서술형 ${tch}문항</span>`; }
  else { sn.innerHTML=`${g?correct:ans} <span>/ ${auto}</span>`; }
  document.getElementById('sp'+t).textContent= auto===0?'—':((g?(ans>0?Math.round(correct/ans*100):0):Math.round(ans/auto*100))+'%');
  document.getElementById('bn'+t).style.width=(auto===0?100:ans/auto*100)+'%';
  let d;
  if(auto===0){ d=`서술형 ${tch}문항 — ✍️ 선생님께 채점받으세요`; }
  else if(g){ d=`객관식 정답 ${correct} · 오답 ${ans-correct} · 미응답 ${auto-ans}`+(tch?` · 서술형 ${tch}문항 선생님 채점`:''); }
  else { d=`객관식 입력 ${ans}/${auto}`+(tch?` · 서술형 ${tch}문항(선생님 채점)`:''); }
  document.getElementById('sd'+t).textContent=d;
}

function updFloat(){
  const fb=document.getElementById('fb'); fb.className='fb k'+(cur%4);
  if(submitted[cur]){ fb.textContent='📊 결과 다시 보기'; }
  else if(autoTotal(cur)===0){ fb.textContent='✍️ 모범답안 보기'; }
  else { const ans=countAnswered(cur); fb.textContent=ans>0?`✅ 제출하고 채점 (${ans}/${autoTotal(cur)})`:'✅ 제출하고 채점'; }
}

function resetTab(t){
  if(!confirm('이 탭의 모든 답을 초기화할까요?')) return;
  picks[t]={}; submitted[t]=false; sub[t]={};
  Object.keys(msel).filter(k=>k.startsWith(t+'_')).forEach(k=>msel[k]=[]);
  localStorage.removeItem(keyD(t));
  buildOMR(t); updScore(t); updFloat();
}

function showResult(){
  const t=cur; if(!submitted[t]){ submitTab(); return; }
  const auto=autoTotal(t), tch=tchTotal(t);
  const done=Object.keys(sub[t]).length, correct=Object.values(sub[t]).filter(v=>v).length, pct=done>0?Math.round(correct/done*100):0;
  if(auto===0){
    document.getElementById('me').textContent='✍️';
    document.getElementById('mt').textContent='서술형 단원';
    document.getElementById('msc').className='ms w'; document.getElementById('msc').textContent=`${tch}문항`;
    document.getElementById('mb').textContent='모든 문항을 선생님께 채점받으세요 (모범답안 표시됨)';
  } else {
    const emoji=pct>=90?'🏆':pct>=70?'😊':pct>=50?'🤔':'😅';
    const title=pct>=90?'훌륭해요!':pct>=70?'잘했어요!':pct>=50?'조금 더 노력해요!':'다시 도전해봐요!';
    const cls=pct>=70?'s':pct>=50?'w':'d';
    document.getElementById('me').textContent=emoji; document.getElementById('mt').textContent=title;
    document.getElementById('msc').className='ms '+cls; document.getElementById('msc').textContent=`${correct} / ${done}`;
    document.getElementById('mb').textContent=`객관식 정답률 ${pct}% · 미응답 ${auto-done}문항`+(tch?` · 서술형 ${tch}문항 선생님 채점`:'');
  }
  document.getElementById('ov').classList.add('on');
}
function closeOv(){ document.getElementById('ov').classList.remove('on'); }

function sw(t){
  cur=t;
  document.querySelectorAll('#tabs .tab').forEach((b,i)=>b.classList.toggle('on',i===t));
  document.querySelectorAll('#panels .panel').forEach((p,i)=>p.classList.toggle('on',i===t));
  updFloat();
}

function saveState(t){
  const multi={}; Object.keys(msel).filter(k=>k.startsWith(t+'_')).forEach(k=>multi[k]=msel[k]);
  localStorage.setItem(keyD(t), JSON.stringify({picks:picks[t], multi, submitted:submitted[t]}));
}
function loadState(){
  A.forEach((_,t)=>{
    const raw=localStorage.getItem(keyD(t)); if(!raw)return;
    let st; try{ st=JSON.parse(raw); }catch(e){ return; }
    if(st.picks){ picks[t]=st.picks; Object.entries(st.picks).forEach(([i,n])=>{ const b=document.getElementById(`cb${t}_${i}_${n}`); if(b)b.classList.add('sel'); }); }
    if(st.multi){ Object.entries(st.multi).forEach(([k,arr])=>{ msel[k]=arr.slice(); arr.forEach(n=>{ const b=document.getElementById(`mc${k}_${n}`); if(b)b.classList.add('sel'); }); }); }
    submitted[t]=!!st.submitted;
  });
}
renderWeek(2);
</script>
