<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>종촌중 3학년 · 기출문제 OMR 채점</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --accent: #e8401c;
  --accent2: #2563eb;
  --correct: #16a34a;
  --wrong: #dc2626;
  --border: #e2d9cc;
  --text: #1a1208;
  --muted: #8b7d6b;
  --week1: #e8401c;
  --week2: #2563eb;
  --week3: #7c3aed;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }

.site-header { background: var(--text); color: #f5f0e8; padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
.back-btn { color: #f5f0e8; text-decoration: none; font-size: 20px; opacity: 0.7; }
.back-btn:hover { opacity: 1; }
.site-header h1 { font-family: 'Black Han Sans', sans-serif; font-size: 20px; flex: 1; }
.site-header .tag { background: var(--accent); color: white; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }

.name-section { background: white; border-bottom: 2px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.name-label { font-weight: 700; font-size: 15px; white-space: nowrap; }
.name-input { border: 2px solid var(--border); border-radius: 8px; padding: 8px 14px; font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 700; width: 180px; outline: none; }
.name-input:focus { border-color: var(--accent2); }
.name-hint { font-size: 12px; color: var(--muted); }

.tabs { display: flex; border-bottom: 2px solid var(--border); background: white; padding: 0 24px; overflow-x: auto; }
.tab-btn { padding: 14px 20px; border: none; background: none; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; color: var(--muted); white-space: nowrap; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
.tab-btn.w1.active { color: var(--week1); border-color: var(--week1); }
.tab-btn.w2.active { color: var(--week2); border-color: var(--week2); }
.tab-btn.w3.active { color: var(--week3); border-color: var(--week3); }
.tab-btn:hover { color: var(--text); }

.content { display: none; padding: 24px; max-width: 960px; margin: 0 auto; }
.content.active { display: block; }

.school-selector { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
.school-btn { padding: 8px 18px; border-radius: 20px; border: 2px solid var(--border); background: white; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; color: var(--muted); }
.school-btn:hover { border-color: var(--text); color: var(--text); }
.school-btn.active.w1 { background: var(--week1); border-color: var(--week1); color: white; }
.school-btn.active.w2 { background: var(--week2); border-color: var(--week2); color: white; }
.school-btn.active.w3 { background: var(--week3); border-color: var(--week3); color: white; }

.omr-card { background: white; border-radius: 16px; border: 2px solid var(--border); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
.omr-header { padding: 20px 24px 16px; border-bottom: 2px dashed var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.omr-title { font-family: 'Black Han Sans', sans-serif; font-size: 20px; }
.omr-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
.omr-meta { font-size: 12px; color: var(--muted); text-align: right; }

/* 객관식 그리드 */
.answer-grid { padding: 20px 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 6px; }
.answer-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
.q-num { font-weight: 700; font-size: 13px; width: 28px; text-align: right; color: var(--muted); flex-shrink: 0; }
.choices { display: flex; gap: 5px; }
.choice-btn { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--border); background: white; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; color: var(--muted); display: flex; align-items: center; justify-content: center; }
.choice-btn:hover { border-color: var(--text); color: var(--text); }
.choice-btn.selected { border-color: var(--text); background: var(--text); color: white; }
.choice-btn.correct-answer { border-color: var(--correct); background: var(--correct); color: white; }
.choice-btn.wrong-pick { border-color: var(--wrong); background: var(--wrong); color: white; }
.choice-btn:disabled { cursor: default; }
.result-icon { font-size: 16px; margin-left: 2px; width: 22px; flex-shrink: 0; }

/* 서술형 섹션 */
.essay-section { padding: 0 24px 20px; }
.essay-divider { border: none; border-top: 2px dashed var(--border); margin: 8px 0 16px; }
.essay-title { font-weight: 700; font-size: 14px; margin-bottom: 12px; color: var(--muted); }
.essay-row { background: #fafafa; border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
.essay-qnum { font-weight: 700; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.essay-input { width: 100%; border: 1.5px solid var(--border); border-radius: 7px; padding: 8px 12px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; outline: none; resize: vertical; min-height: 52px; }
.essay-input:focus { border-color: var(--accent2); }
.essay-answer-reveal { display: none; margin-top: 10px; background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 8px; padding: 10px 14px; }
.essay-answer-reveal.show { display: block; }
.essay-answer-label { font-size: 11px; font-weight: 700; color: #16a34a; margin-bottom: 4px; letter-spacing: 0.5px; }
.essay-answer-text { font-size: 13px; color: #15803d; line-height: 1.5; }
.essay-self-check { display: none; margin-top: 8px; gap: 8px; }
.essay-self-check.show { display: flex; }
.self-btn { flex: 1; padding: 7px; border-radius: 8px; border: 2px solid var(--border); background: white; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
.self-btn.o.selected { background: var(--correct); border-color: var(--correct); color: white; }
.self-btn.x.selected { background: var(--wrong); border-color: var(--wrong); color: white; }

/* 푸터 */
.omr-footer { border-top: 2px dashed var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.submit-btn { background: var(--text); color: white; border: none; border-radius: 10px; padding: 12px 32px; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.submit-btn:hover { transform: scale(1.02); opacity: 0.9; }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.reset-btn { background: none; border: 2px solid var(--border); border-radius: 10px; padding: 11px 20px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; color: var(--muted); transition: all 0.2s; }
.reset-btn:hover { border-color: var(--text); color: var(--text); }

/* 결과 */
.score-result { display: none; background: linear-gradient(135deg, #1a1208, #3d2b1a); color: white; border-radius: 16px; padding: 28px 24px; margin-top: 20px; text-align: center; }
.score-result.show { display: block; }
.score-badge { font-family: 'Black Han Sans', sans-serif; font-size: 56px; line-height: 1; margin-bottom: 6px; }
.score-label { font-size: 13px; opacity: 0.7; margin-bottom: 12px; }
.score-detail { font-size: 14px; opacity: 0.9; margin-bottom: 8px; }
.score-essay-note { font-size: 12px; opacity: 0.6; margin-bottom: 18px; }
.capture-msg { background: var(--accent); color: white; font-size: 14px; font-weight: 700; padding: 12px 24px; border-radius: 10px; display: inline-block; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
.score-name { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
</style>
</head>
<body>

<div class="site-header">
  <a href="index.html" class="back-btn">←</a>
  <h1>종촌중학교 3학년</h1>
  <span class="tag">토요보강</span>
</div>

<div class="name-section">
  <span class="name-label">✏️ 이름</span>
  <input class="name-input" id="studentName" type="text" placeholder="이름을 입력하세요" maxlength="10">
  <span class="name-hint">결과 캡처 시 이름이 함께 표시됩니다</span>
</div>

<div class="tabs">
  <button class="tab-btn w1 active" onclick="switchWeek(1)">6/13 (1주차)</button>
  <button class="tab-btn w2" onclick="switchWeek(2)">6/20 (2주차)</button>
  <button class="tab-btn w3" onclick="switchWeek(3)">6/27 (3주차)</button>
</div>

<div class="content active" id="week1">
  <div class="school-selector">
    <button class="school-btn w1 active" onclick="switchSchool(1,'고실중')">고실중</button>
    <button class="school-btn w1" onclick="switchSchool(1,'구남중')">구남중</button>
    <button class="school-btn w1" onclick="switchSchool(1,'구미인덕중')">구미인덕중</button>
    <button class="school-btn w1" onclick="switchSchool(1,'다사중')">다사중</button>
  </div>
  <div id="week1-omr"></div>
</div>

<div class="content" id="week2">
  <div class="school-selector">
    <button class="school-btn w2 active" onclick="switchSchool(2,'대방중')">대방중</button>
    <button class="school-btn w2" onclick="switchSchool(2,'대전글꽃중')">대전글꽃중</button>
    <button class="school-btn w2" onclick="switchSchool(2,'동화중')">동화중</button>
    <button class="school-btn w2" onclick="switchSchool(2,'모동중')">모동중</button>
  </div>
  <div id="week2-omr"></div>
</div>

<div class="content" id="week3">
  <div class="school-selector">
    <button class="school-btn w3 active" onclick="switchSchool(3,'모산중')">모산중</button>
    <button class="school-btn w3" onclick="switchSchool(3,'백운중')">백운중</button>
    <button class="school-btn w3" onclick="switchSchool(3,'봉황중')">봉황중</button>
    <button class="school-btn w3" onclick="switchSchool(3,'산남중')">산남중</button>
  </div>
  <div id="week3-omr"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// ★ 학교 데이터 ★
// mc: 객관식 정답 배열 (1~5)
// essay: 서술형 [{q: "문제번호표시", a: "정답"}]
// ═══════════════════════════════════════════════════════
const SCHOOLS = {
  '고실중': {
    week: 1, total: 30,
    mc: [5, 2, 2, 5, 2,  4, 5, 3, 5, 4,  2, 4, 5, 3, 4,  2, 1, 4, 4, 1,  2, 5, 3, 2, 1,  3, 3],

  '구남중': {

    essayMode: 'show',
    essay: [
      {q:'21번', a:'(1) , which I visited two years ago. (2) , which has about four hundred thousand works of art. (3) , which Gustave Eiffel designed and built.'},
      {q:'22번', a:'(1) Tom Cruise has been acting in films since 1981. (2) I have been reading Hamlet for 2 hours.'},

      {q:'26번', a:'(1) The juice is on me - I’ll pay for the juice (2) Don’t make a long face - Don’t be sad (3) I’ll keep my fingers crossed for you - I wish you good luck'},
      {q:'27번', a:'(A) Can you say that again? (B) What does that mean? (C) It means I’ll pay for the juice.'}
    ]
  },
  '구미인덕중': {
    week: 1, total: 25,
    mc: [1, 5, 1, 3, 2,  5, 4, 3, 5, 3,  2, 4, 4, 2, 3,  5, 3, 2, 1, 3,  1, 2, 2, 4, 4],
    essay: []
  },
  '다사중': {
    week: 1, total: 26,
    mc: [3, 4, 5, 2, 2,  2, 5, 1, 5, 1,  4, 1, 3, 1, 3,  1, 5, 4, 4, 3],
    essayMode: 'show',
    essay: [
      {q:'10번', a:'(A) a bath with a head massage (B) the work shampoo (C) shampoo got its present          meaning    of “washing the hair”'},
      {q:'13번', a:'Managing money is not easy, and becoming a smart spender takes effort'},
      {q:'18번', a:'I don’t know how I shold solve this problem'},
      {q:'24번', a:'(1) It’s strange that butterflies taste with their feet. (2) It’s thought that koalas sleep at least 19 hours a day. (3) It’s surprise that dolphins have names for each other.'},
      {q:'25번', a:'(1) which was painted by Marc Chagall (2) who helped many poor people in the world (3) which was written by Shakespeare'},
      {q:'26번', a:'I’m in trouble'}
    ]
  },
  '대방중': {
    week: 2, total: 25,
    mc: [2, 3, 4, 5, 2,  2, 5, 1],
    essayMode: 'show',
    essay: [
      {q:'3번', a:'(1) I\'ll pay for it / (2) I don\'t like something'},
      {q:'6번', a:'She got first prize, which made her parents glad.'},
      {q:'7번', a:'This man, who saved me from the fire, is my hero.'},
      {q:'8번', a:'(1) She married a handsome doctor, who she met on a bus. (2) He bought me a scarf, which I never wore.'},
      {q:'9번', a:'(1) I did see Jimin at the concert last weekend. (2) It was Jimin that I saw at the concert last weekend. (3) It was at the concert that I saw Jimin last weekend. (4) It was last weekend that I saw Jimin at the concert.'},
      {q:'10번', a:'(1) ⓒ → I stayed at Green Hotel, which a friend of mine recommended. (2) ⓗ → Our new car, which we bought last month, seats five people.'},
      {q:'11번', a:'get a refund'},
      {q:'12번', a:'exchange'},
      {q:'13번', a:'(A) Managing/To manage (B) becoming/to become (C) takes'},
      {q:'14번', a:'(가) effort (나) result'},
      {q:'15번', a:'제이, 루나'},
      {q:'19번', a:'(1) have been saving (2) have been spending'},
      {q:'21번', a:'어떤 물건이 할인 판매를 하면 그것이 필요하지 않아도 산다.'},
      {q:'22번', a:'weekly allowance'},
      {q:'23번', a:'(A) advised (B) divide (C) days (D) carry'},
      {q:'24번', a:'It has been raining since last night.'},
      {q:'25번', a:'I can\'t decide when to go.'}
    ]
  },
  '대전글꽃중': {
    week: 2, total: 26,
    mc: [5, 1, 3, 5, 3,  1, 3, 4, 4, 1,  4, 4, 3, 4, 2,  2, 2, 5, 2, 1,  1, 4, 4, 5, 5,  3],
    essay: []
  },
  '동화중': {
    week: 2, total: 30,
    mc: [4, 3, 5, 2, 4,  1, 5, 3, 4, 1,  5, 1, 3, 5, 2,  5, 1, 3, 4, 5,  2, 1, 2, 4, 2,  2, 3, 5, 4, 4],
    essay: []
  },
  '모동중': {
    week: 2, total: 28,
    mc: [3, 4, 2, 1, 4,  1, 1, 3, 2, 5,  3, 5, 3, 1, 5,  2, 5, 4, 4, 2],
    essayMode: 'show',
    essay: [
      {q:'5번', a:'Can you help me with this milk?'},
      {q:'14번', a:'(1) enough to (2) I’m focused enough to leave all my worries behind.'},
      {q:'15번', a:'Ex) When I feel stressed, I buy beautiful clothes. I feel better when I look at myself in the mirror in beautiful clothes.'},
      {q:'21번', a:'(1) Turkey is a country where East meets West. (2) Turkey is a country in which East meets West.'},
      {q:'22번', a:'It is the largest flower market in the world.'},
      {q:'23번', a:'Ex) Grand Bazaar, Turkey, I want to eat lokum, a traditional Turkish candy.'},
      {q:'27번', a:'(1) Ex) we plan to go on a picnic. (2) Ex) I can’t wait that restaurant'},
      {q:'28번', a:'(1) Ex) Busan Simin Park, I can take a walk with my friends. (2) Ex) Christmas, when our family have a party together.'}
    ]
  },
  '모산중': {
    week: 3, total: 25,
    mc: [4, 4, 5, 4, 3,  1, 4, 3, 1, 2,  2, 5, 3, 3, 4,  1, 4, 2, 5, 1,  5, 5, 3, 2, 5],
    essay: []
  },
  '백운중': {
    week: 3, total: 28,
    mc: [3, 3, 4, 3, 5,  1, 3, 3, 4, 2,  2, 2, 4, 3, 2,  4, 4, 5, 1, 2,  2, 5, 2, 3, 3],
    essayMode: 'show',
    essay: [
      {q:'6번(복수정답)', a:'정답: ①, ⑤'},
      {q:'21번(복수정답)', a:'정답: ④, ⑤'},
      {q:'28번(복수정답)', a:'정답: ①, ③'}
    ]
  },
  '봉황중': {
    week: 3, total: 20,
    mc: [2, 4, 2, 3, 1,  4, 4, 5, 3, 5,  2, 5, 2, 1, 3,  2],
    essayMode: 'show',
    essay: [
      {q:'6번(복수정답)', a:'정답: ⓑ, ⓒ'},
      {q:'11번(복수정답)', a:'정답: ⓒ, ⓔ'},
      {q:'14번', a:'suggested'},
      {q:'20번', a:'is strange that Nancy does not remember me.'}
    ]
  },
  '산남중': {
    week: 3, total: 24,
    mc: [3, 1, 2, 4, 1,  5, 3, 2, 3, 4,  5, 5, 5, 2, 4,  1, 5, 1, 2, 5,  2, 1, 3, 4],
    essay: []
  }
};

const state = {
  week: 1,
  school: { 1: '고실중', 2: '대방중', 3: '모산중' },
  picks: {},
  essayInputs: {},
  essaySelf: {},
  submitted: {}
};

function getPicks(school) {
  if (!state.picks[school]) state.picks[school] = new Array(SCHOOLS[school].mc.length).fill(0);
  return state.picks[school];
}
function getEssayInputs(school) {
  if (!state.essayInputs[school]) state.essayInputs[school] = SCHOOLS[school].essay.map(() => '');
  return state.essayInputs[school];
}
function getEssaySelf(school) {
  if (!state.essaySelf[school]) state.essaySelf[school] = SCHOOLS[school].essay.map(() => null);
  return state.essaySelf[school];
}
function isSubmitted(school) { return !!state.submitted[school]; }

function switchWeek(w) {
  state.week = w;
  document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
  document.getElementById('week' + w).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', i === w - 1));
  renderOMR(w, state.school[w]);
}

function switchSchool(week, school) {
  state.school[week] = school;
  document.getElementById('week' + week).querySelectorAll('.school-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === school);
  });
  renderOMR(week, school);
}

function renderOMR(week, school) {
  const container = document.getElementById('week' + week + '-omr');
  const data = SCHOOLS[school];
  const picks = getPicks(school);
  const essayInputs = getEssayInputs(school);
  const essaySelf = getEssaySelf(school);
  const submitted = isSubmitted(school);
  const answers = data.mc;
  const weekNames = {1:'6/13 (1주차)',2:'6/20 (2주차)',3:'6/27 (3주차)'};

  // 객관식
  let mcRows = '';
  for (let i = 0; i < answers.length; i++) {
    let choices = '';
    for (let c = 1; c <= 5; c++) {
      let cls = 'choice-btn';
      if (submitted) {
        if (c === answers[i] && c === picks[i]) cls += ' correct-answer';
        else if (c === picks[i] && picks[i] !== answers[i]) cls += ' wrong-pick';
        else if (c === picks[i]) cls += ' selected';
      } else {
        if (c === picks[i]) cls += ' selected';
      }
      choices += `<button class="${cls}" ${submitted ? 'disabled' : ''} onclick="pick(${week},'${school}',${i},${c})">${c}</button>`;
    }
    let icon = '';
    if (submitted) icon = picks[i] === answers[i] ? '<span class="result-icon">✅</span>' : '<span class="result-icon">❌</span>';
    mcRows += `<div class="answer-row"><span class="q-num">${i+1}</span><div class="choices">${choices}</div>${icon}</div>`;
  }

  // 서술형
  let essayHTML = '';
  if (data.essay.length > 0) {
    const showMode = data.essayMode === 'show'; // 고실중: 정답 바로 보여주고 셀프채점
    let essayRows = '';
    data.essay.forEach((item, idx) => {
      const val = essayInputs[idx] || '';
      const selfVal = essaySelf[idx];
      const oSel = selfVal === true ? 'selected' : '';
      const xSel = selfVal === false ? 'selected' : '';
      const resultIcon = selfVal === true ? '✅' : selfVal === false ? '❌' : '❓';

      if (showMode) {
        // 고실중 방식: 채점 후 정답 바로 보여주고 O/X 체크
        const revealClass = submitted ? 'show' : '';
        const selfClass = submitted ? 'show' : '';
        essayRows += `
          <div class="essay-row">
            <div class="essay-qnum">📝 ${item.q} ${submitted ? resultIcon : ''}</div>
            <div class="essay-answer-reveal ${revealClass}">
              <div class="essay-answer-label">✔ 모범 정답</div>
              <div class="essay-answer-text">${item.a}</div>
            </div>
            <div class="essay-self-check ${selfClass}">
              <button class="self-btn o ${oSel}" onclick="setSelf('${school}',${idx},true,${week})">⭕ 맞음</button>
              <button class="self-btn x ${xSel}" onclick="setSelf('${school}',${idx},false,${week})">❌ 틀림</button>
            </div>
          </div>`;
      } else {
        // 일반 방식: 입력 후 채점하면 정답 공개 + O/X
        const revealClass = submitted ? 'show' : '';
        const selfClass = submitted ? 'show' : '';
        essayRows += `
          <div class="essay-row">
            <div class="essay-qnum">📝 ${item.q} ${submitted ? resultIcon : ''}</div>
            <textarea class="essay-input" placeholder="답을 여기에 입력하세요" ${submitted ? 'disabled' : ''}
              oninput="saveEssay('${school}',${idx},this.value)">${val}</textarea>
            <div class="essay-answer-reveal ${revealClass}">
              <div class="essay-answer-label">✔ 모범 정답</div>
              <div class="essay-answer-text">${item.a}</div>
            </div>
            <div class="essay-self-check ${selfClass}">
              <button class="self-btn o ${oSel}" onclick="setSelf('${school}',${idx},true,${week})">⭕ 맞음</button>
              <button class="self-btn x ${xSel}" onclick="setSelf('${school}',${idx},false,${week})">❌ 틀림</button>
            </div>
          </div>`;
      }
    });

    const noticeMsg = showMode
      ? '📋 서술형 셀프채점합니다. 선생님께 확인받으세요.'
      : '✏️ 서술형 문제 — 채점 후 정답을 확인하고 O/X를 직접 체크하세요';

    essayHTML = `
      <div class="essay-section">
        <hr class="essay-divider">
        <div class="essay-title">${noticeMsg}</div>
        ${essayRows}
      </div>`;
  }

  // 점수
  let scoreHTML = '';
  if (submitted) {
    const name = document.getElementById('studentName').value.trim() || '학생';
    const mcCorrect = picks.filter((p, i) => p === answers[i]).length;
    const mcWrong = picks.filter((p, i) => p !== 0 && p !== answers[i]).length;
    const mcBlank = picks.filter(p => p === 0).length;
    const essayCorrect = essaySelf.filter(v => v === true).length;
    const essayWrong = essaySelf.filter(v => v === false).length;
    const essayBlank = essaySelf.filter(v => v === null).length;
    const totalCorrect = mcCorrect + essayCorrect;
    const totalQ = answers.length + data.essay.length;
    const pct = Math.round(totalCorrect / totalQ * 100);
    const essayNote = data.essay.length > 0 ? `<div class="score-essay-note">객관식 ${mcCorrect}/${answers.length} + 서술형 ${essayCorrect}/${data.essay.length} (자가채점)</div>` : '';
    scoreHTML = `
      <div class="score-result show">
        <div class="score-name">📋 ${name} · ${school} 결과</div>
        <div class="score-badge">${totalCorrect}<span style="font-size:28px">/${totalQ}</span></div>
        <div class="score-label">${weekNames[week]} ${school} 기출문제</div>
        ${essayNote}
        <div class="score-detail">맞은 문제 ${totalCorrect}개 &nbsp;|&nbsp; 틀린 문제 ${mcWrong + essayWrong}개 &nbsp;|&nbsp; 정답률 ${pct}%</div>
        <div class="capture-msg">📸 캡처해서 선생님께 제출!</div>
      </div>`;
  }

  container.innerHTML = `
    <div class="omr-card">
      <div class="omr-header">
        <div>
          <div class="omr-title">${school} 기출문제</div>
          <div class="omr-subtitle">2024학년도 · ${weekNames[week]} · 객관식 ${answers.length}문항${data.essay.length > 0 ? ' + 서술형 ' + data.essay.length + '문항' : ''}</div>
        </div>
        <div class="omr-meta">객관식: 1~5 클릭<br>${data.essay.length > 0 ? '서술형: 직접 입력 후 O/X' : '답을 클릭해서 선택'}</div>
      </div>
      <div class="answer-grid">${mcRows}</div>
      ${essayHTML}
      <div class="omr-footer">
        <button class="reset-btn" onclick="resetSchool('${school}',${week})">↺ 초기화</button>
        <button class="submit-btn" onclick="submitOMR('${school}',${week})" ${submitted ? 'disabled' : ''}>
          ${submitted ? '✅ 채점 완료' : '채점하기'}
        </button>
      </div>
    </div>
    ${scoreHTML}
  `;
}

function pick(week, school, qIdx, choice) {
  if (isSubmitted(school)) return;
  const picks = getPicks(school);
  picks[qIdx] = picks[qIdx] === choice ? 0 : choice;
  renderOMR(week, school);
}

function saveEssay(school, idx, val) {
  getEssayInputs(school)[idx] = val;
}

function setSelf(school, idx, val, week) {
  getEssaySelf(school)[idx] = val;
  renderOMR(week, school);
  setTimeout(() => {
    const result = document.querySelector('.score-result.show');
    if (result) result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

function submitOMR(school, week) {
  const name = document.getElementById('studentName').value.trim();
  if (!name) { alert('⚠️ 이름을 먼저 입력해주세요!'); document.getElementById('studentName').focus(); return; }
  const picks = getPicks(school);
  const blank = picks.filter(p => p === 0).length;
  if (blank > 0) {
    if (!confirm(`⚠️ 객관식 중 ${blank}문제를 체크하지 않았어요.\n그래도 채점할까요?`)) return;
  }
  state.submitted[school] = true;
  renderOMR(week, school);
  setTimeout(() => {
    const result = document.querySelector('.score-result.show');
    if (result) result.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

function resetSchool(school, week) {
  if (!confirm(`⚠️ ${school} 답안을 모두 초기화할까요?`)) return;
  state.picks[school] = new Array(SCHOOLS[school].mc.length).fill(0);
  state.essayInputs[school] = SCHOOLS[school].essay.map(() => '');
  state.essaySelf[school] = SCHOOLS[school].essay.map(() => null);
  state.submitted[school] = false;
  renderOMR(week, school);
}

// 초기 렌더
renderOMR(1, '고실중');
renderOMR(2, '대방중');
renderOMR(3, '모산중');
</script>
</body>
</html>
