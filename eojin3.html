<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어진중3 OMR 채점</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=Teko:wght@600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #22263a;
    --accent: #4f8ef7;
    --accent2: #f7a34f;
    --green: #3ecf6e;
    --red: #f7504f;
    --text: #e8eaf6;
    --muted: #8891b0;
    --border: #2e3352;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a2040 0%, #0f1530 100%);
    border-bottom: 2px solid var(--accent);
    padding: 20px 16px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(79,142,247,0.15);
  }
  .header h1 {
    font-family: 'Teko', sans-serif;
    font-size: 2rem;
    letter-spacing: 2px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(79,142,247,0.5);
  }
  .header p { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }

  /* WEEK TABS */
  .week-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 16px;
    flex-wrap: wrap;
  }
  .week-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    color: var(--muted);
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .week-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(79,142,247,0.12);
    box-shadow: 0 0 12px rgba(79,142,247,0.25);
  }

  /* SCHOOL TABS */
  .school-tabs {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 0 16px 16px;
    flex-wrap: wrap;
  }
  .school-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--muted);
    padding: 7px 16px;
    border-radius: 14px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .school-btn.active {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(247,163,79,0.12);
  }

  /* SECTION */
  .section { display: none; }
  .section.active { display: block; }

  /* SCHOOL CONTENT */
  .school-content { display: none; padding: 0 12px; }
  .school-content.active { display: block; }

  .school-title {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent2);
    margin-bottom: 16px;
    padding: 10px;
    background: var(--surface);
    border-radius: 12px;
    border-left: 4px solid var(--accent2);
  }

  /* QUESTIONS */
  .questions-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 640px;
    margin: 0 auto;
  }

  /* MULTIPLE CHOICE */
  .q-card {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    transition: border-color 0.2s;
  }
  .q-card.correct { border-color: var(--green) !important; background: rgba(62,207,110,0.07); }
  .q-card.wrong { border-color: var(--red) !important; background: rgba(247,80,79,0.07); }

  .q-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .q-num {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--accent);
    background: rgba(79,142,247,0.15);
    padding: 3px 10px;
    border-radius: 8px;
  }
  .q-type-badge {
    font-size: 0.7rem;
    color: var(--muted);
    background: var(--surface);
    padding: 2px 8px;
    border-radius: 6px;
  }
  .q-status { font-size: 1.2rem; }

  .choices {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .choice-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .choice-btn:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.08); }
  .choice-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
  .choice-btn.correct-ans { background: var(--green); border-color: var(--green); color: #fff; }
  .choice-btn.wrong-ans { background: var(--red); border-color: var(--red); color: #fff; }

  /* SUBJECTIVE - REVEAL TYPE */
  .q-subjective {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
  }
  .reveal-btn {
    width: 100%;
    padding: 10px;
    background: rgba(79,142,247,0.15);
    border: 1.5px dashed var(--accent);
    border-radius: 10px;
    color: var(--accent);
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .reveal-btn:hover { background: rgba(79,142,247,0.25); }

  .answer-reveal {
    display: none;
    margin-top: 10px;
    background: rgba(62,207,110,0.1);
    border: 1.5px solid var(--green);
    border-radius: 10px;
    padding: 12px;
  }
  .answer-reveal.show { display: block; }
  .answer-reveal .label {
    font-size: 0.75rem;
    color: var(--green);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .answer-reveal .ans-text {
    font-size: 0.88rem;
    color: var(--text);
    line-height: 1.6;
  }

  /* SELF CHECK */
  .self-check {
    display: none;
    margin-top: 8px;
    gap: 8px;
    flex-wrap: wrap;
  }
  .self-check.show { display: flex; }
  .self-o, .self-x {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: none;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }
  .self-o { background: rgba(62,207,110,0.2); color: var(--green); border: 2px solid var(--green); }
  .self-x { background: rgba(247,80,79,0.2); color: var(--red); border: 2px solid var(--red); }
  .self-o.picked { background: var(--green); color: #fff; }
  .self-x.picked { background: var(--red); color: #fff; }

  /* SCORE */
  .score-section {
    max-width: 640px;
    margin: 20px auto;
    padding: 0 12px;
  }
  .score-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #7b5ef7);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 1px;
    transition: opacity 0.2s;
    box-shadow: 0 4px 20px rgba(79,142,247,0.4);
  }
  .score-btn:hover { opacity: 0.9; }

  .result-box {
    display: none;
    margin-top: 14px;
    background: var(--card);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    border: 2px solid var(--accent);
    box-shadow: 0 0 30px rgba(79,142,247,0.2);
  }
  .result-box.show { display: block; }
  .result-box .big-score {
    font-family: 'Teko', sans-serif;
    font-size: 3.5rem;
    color: var(--accent);
    line-height: 1;
    text-shadow: 0 0 20px rgba(79,142,247,0.6);
  }
  .result-box .score-label { color: var(--muted); font-size: 0.85rem; margin: 4px 0 12px; }
  .result-box .detail { font-size: 0.82rem; color: var(--muted); }
  .result-box .capture-note {
    margin-top: 14px;
    padding: 10px;
    background: rgba(247,163,79,0.15);
    border: 1.5px solid var(--accent2);
    border-radius: 10px;
    color: var(--accent2);
    font-size: 0.88rem;
    font-weight: 700;
  }

  /* RESET */
  .reset-btn {
    width: 100%;
    padding: 10px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-size: 0.85rem;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--red); color: var(--red); }

  /* PROGRESS BAR */
  .progress-wrap {
    max-width: 640px;
    margin: 0 auto 12px;
    padding: 0 12px;
  }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.3s;
    width: 0%;
  }
  .progress-text {
    font-size: 0.75rem;
    color: var(--muted);
    text-align: right;
    margin-top: 4px;
  }
</style>
</head>

// Track answers
const userAnswers = {};

// =============================================
// BUILD QUESTIONS
// =============================================
function buildSchool(schoolId) {
  const data = SCHOOLS[schoolId];
  if (!data) return;
  const grid = document.getElementById('qgrid-' + schoolId);
  if (grid.innerHTML !== '') return; // already built

  userAnswers[schoolId] = {};
  data.questions.forEach(q => {
    userAnswers[schoolId][q.n] = null;
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'qcard-' + schoolId + '-' + q.n;

    if (q.type === 'mc') {
      // determine max choices
      let maxChoice = 5;
      if (Array.isArray(q.ans)) maxChoice = 5;
      let choicesHTML = '';
      for (let i = 1; i <= maxChoice; i++) {
        choicesHTML += `<button class="choice-btn" id="cb-${schoolId}-${q.n}-${i}" onclick="selectChoice('${schoolId}',${q.n},${i})">${i}</button>`;
      }
      card.innerHTML = `
        <div class="q-top">
          <span class="q-num">Q${q.n}</span>
          <span class="q-type-badge">객관식</span>
          <span class="q-status" id="qs-${schoolId}-${q.n}">⬜</span>
        </div>
        <div class="choices">${choicesHTML}</div>
      `;
    } else {
      // subjective
      const ansText = Array.isArray(q.ans) ? q.ans.join('\n') : q.ans;
      card.innerHTML = `
        <div class="q-top">
          <span class="q-num">Q${q.n}</span>
          <span class="q-type-badge">서술형</span>
          <span class="q-status" id="qs-${schoolId}-${q.n}">⬜</span>
        </div>
        <div style="font-size:0.8rem;color:var(--muted);margin-bottom:6px;">정답을 확인 후 O/X로 자가채점하세요</div>
        <button class="reveal-btn" onclick="revealAns('${schoolId}',${q.n})">🔍 정답 보기</button>
        <div class="answer-reveal" id="ans-${schoolId}-${q.n}">
          <div class="label">✅ 정답</div>
          <div class="ans-text">${ansText.replace(/\n/g,'<br>')}</div>
        </div>
        <div class="self-check" id="sc-${schoolId}-${q.n}">
          <button class="self-o" id="so-${schoolId}-${q.n}" onclick="selfCheck('${schoolId}',${q.n},'o')">⭕ 맞았어요</button>
          <button class="self-x" id="sx-${schoolId}-${q.n}" onclick="selfCheck('${schoolId}',${q.n},'x')">❌ 틀렸어요</button>
        </div>
      `;
      card.className = 'q-card q-subjective';
    }
    grid.appendChild(card);
  });
}

function selectChoice(schoolId, qNum, choice) {
  const data = SCHOOLS[schoolId];
  const q = data.questions.find(x => x.n === qNum);

  // Already answered
  if (userAnswers[schoolId][qNum] !== null) return;

  userAnswers[schoolId][qNum] = choice;

  const correct = Array.isArray(q.ans) ? q.ans.includes(choice) : q.ans === choice;
  const correctAns = Array.isArray(q.ans) ? q.ans : [q.ans];

  // Update button styles
  for (let i = 1; i <= 5; i++) {
    const btn = document.getElementById(`cb-${schoolId}-${qNum}-${i}`);
    if (!btn) continue;
    btn.style.pointerEvents = 'none';
    if (i === choice) {
      btn.classList.add(correct ? 'correct-ans' : 'wrong-ans');
    }
    if (!correct && correctAns.includes(i)) {
      btn.classList.add('correct-ans');
    }
  }

  const card = document.getElementById(`qcard-${schoolId}-${qNum}`);
  card.classList.add(correct ? 'correct' : 'wrong');

  const status = document.getElementById(`qs-${schoolId}-${qNum}`);
  status.textContent = correct ? '✅' : '❌';

  updateProgress(schoolId);
}

function revealAns(schoolId, qNum) {
  const ans = document.getElementById(`ans-${schoolId}-${qNum}`);
  const sc = document.getElementById(`sc-${schoolId}-${qNum}`);
  ans.classList.add('show');
  sc.classList.add('show');
  const revBtn = ans.previousElementSibling;
  if(revBtn && revBtn.classList.contains('reveal-btn')) revBtn.style.display = 'none';
}

function selfCheck(schoolId, qNum, result) {
  if (userAnswers[schoolId][qNum] !== null) return;
  userAnswers[schoolId][qNum] = result;

  const card = document.getElementById(`qcard-${schoolId}-${qNum}`);
  card.classList.add(result === 'o' ? 'correct' : 'wrong');

  const so = document.getElementById(`so-${schoolId}-${qNum}`);
  const sx = document.getElementById(`sx-${schoolId}-${qNum}`);
  if (result === 'o') { so.classList.add('picked'); so.style.pointerEvents='none'; sx.style.pointerEvents='none'; }
  else { sx.classList.add('picked'); so.style.pointerEvents='none'; sx.style.pointerEvents='none'; }

  const status = document.getElementById(`qs-${schoolId}-${qNum}`);
  status.textContent = result === 'o' ? '✅' : '❌';

  updateProgress(schoolId);
}

function updateProgress(schoolId) {
  const data = SCHOOLS[schoolId];
  const total = data.questions.length;
  let done = 0;
  data.questions.forEach(q => { if (userAnswers[schoolId][q.n] !== null) done++; });
  const pct = (done / total * 100).toFixed(0);
  const fill = document.getElementById('prog-' + schoolId);
  const txt = document.getElementById('prog-text-' + schoolId);
  if (fill) fill.style.width = pct + '%';
  if (txt) txt.textContent = `${done} / ${total} 완료`;
}

function calcScore(schoolId) {
  const data = SCHOOLS[schoolId];
  let correct = 0, total = 0, unanswered = 0;

  data.questions.forEach(q => {
    total++;
    const ua = userAnswers[schoolId][q.n];
    if (ua === null) { unanswered++; return; }
    if (q.type === 'mc') {
      const isCorrect = Array.isArray(q.ans) ? q.ans.includes(ua) : q.ans === ua;
      if (isCorrect) correct++;
    } else {
      if (ua === 'o') correct++;
    }
  });

  const answered = total - unanswered;
  const pct = answered > 0 ? Math.round(correct / answered * 100) : 0;
  const score = Math.round(correct / total * 100);

  const resultBox = document.getElementById('result-' + schoolId);
  resultBox.innerHTML = `
    <div class="big-score">${score}점</div>
    <div class="score-label">전체 문항 기준 점수</div>
    <div class="detail">
      ${total}문항 중 ${correct}개 정답<br>
      미응답: ${unanswered}문항 · 정답률: ${pct}%
    </div>
    <div class="capture-note">📸 캡처해서 선생님께 제출!</div>
  `;
  resultBox.classList.add('show');
}

function resetSchool(schoolId) {
  const data = SCHOOLS[schoolId];
  userAnswers[schoolId] = {};
  data.questions.forEach(q => { userAnswers[schoolId][q.n] = null; });

  // Rebuild
  const grid = document.getElementById('qgrid-' + schoolId);
  grid.innerHTML = '';
  buildSchool(schoolId);

  const resultBox = document.getElementById('result-' + schoolId);
  resultBox.classList.remove('show');
  resultBox.innerHTML = '';

  updateProgress(schoolId);
}

// =============================================
// NAVIGATION
// =============================================
let currentWeek = 1;

function showWeek(n) {
  currentWeek = n;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('week' + n).classList.add('active');
  document.querySelectorAll('.week-btn')[n-1].classList.add('active');
}

function showSchool(weekPrefix, schoolKey) {
  const schoolId = weekPrefix + '-' + schoolKey;
  const weekEl = document.getElementById('week' + weekPrefix.replace('w',''));
  weekEl.querySelectorAll('.school-content').forEach(s => s.classList.remove('active'));
  weekEl.querySelectorAll('.school-btn').forEach(b => b.classList.remove('active'));

  const target = document.getElementById(schoolId);
  if (target) target.classList.add('active');

  // find the button that matches
  const btns = weekEl.querySelectorAll('.school-btn');
  const keys = {
    w1: ['gosan','gwangju','guam'],
    w2: ['gupo','geumpa','baekseok'],
    w3: ['salesio','seryu','yeonsu']
  };
  const wk = 'w' + weekPrefix.replace('w','');
  const idx = keys[wk].indexOf(schoolKey);
  if (idx >= 0) btns[idx].classList.add('active');

  buildSchool(schoolId);
}

// Initialize
(function init() {
  // Build first visible school in each week
  buildSchool('w1-gosan');
  buildSchool('w2-gupo');
  buildSchool('w3-salesio');
})();
</script>
