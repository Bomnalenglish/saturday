<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>봄날 토요보강 OMR 채점</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ff;
    --card-bg: #ffffff;
    --border: #dde3f0;
    --accent1: #f0883e;
    --accent2: #3b82f6;
    --accent3: #22c55e;
    --accent4: #a855f7;
    --text: #1e293b;
    --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  /* 벚꽃 파티클 */
  .petals {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .petal {
    position: absolute;
    top: -20px;
    border-radius: 50% 0 50% 0;
    animation: fall linear infinite;
    opacity: 0.7;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }
  .container {
    position: relative;
    z-index: 1;
    max-width: 700px;
    width: 100%;
  }
  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent1), #ff6b35);
    color: white;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(28px, 6vw, 48px);
    line-height: 1.1;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.6;
  }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    padding-left: 4px;
  }
  .cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    text-decoration: none;
    color: var(--text);
    display: block;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 3px;
  }
  .card.c1::before { background: linear-gradient(90deg, var(--accent1), #ff6b35); }
  .card.c2::before { background: linear-gradient(90deg, var(--accent2), #1f6feb); }
  .card.c3::before { background: linear-gradient(90deg, var(--accent3), #196c2e); }
  .card.c4::before { background: linear-gradient(90deg, var(--accent4), #8957e5); }
  .card:hover {
    transform: translateY(-4px);
    border-color: #b8c4e0;
    box-shadow: 0 12px 32px rgba(59,130,246,0.15);
  }
  .card.disabled {
    opacity: 0.4;
    cursor: not-allowed;
    pointer-events: none;
  }
  .school-grade {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .c1 .school-grade { color: var(--accent1); }
  .c2 .school-grade { color: var(--accent2); }
  .c3 .school-grade { color: var(--accent3); }
  .c4 .school-grade { color: var(--accent4); }
  .school-name {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    margin-bottom: 8px;
  }
  .school-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }
  .coming-soon {
    display: inline-block;
    background: var(--border);
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 4px;
    margin-top: 8px;
  }
  .arrow {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
    opacity: 0.3;
    transition: all 0.2s;
  }
  .card:hover .arrow {
    opacity: 1;
    right: 16px;
  }
  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 20px;
    line-height: 1.8;
  }
  @media (max-width: 480px) {
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="petals" id="petals"></div>

<div class="container">
  <div class="header">
    <div class="badge">🌸 봄날 토요보강</div>
    <h1>봄날토요보강<br>OMR 채점</h1>
    <p class="subtitle">학교와 학년을 선택해서<br>OMR 채점을 시작하세요</p>
  </div>

  <div class="section-label">▸ 학교 · 학년 선택</div>
  <div class="cards-grid">

    <a href="jongchon3.html" class="card c1">
      <div class="school-grade">3학년</div>
      <div class="school-name">종촌중</div>
      <div class="school-desc">토요보강<br>1~3주 · 9개교 기출</div>
      <span class="arrow">→</span>
    </a>

    <a href="eojin3.html" class="card c2">
      <div class="school-grade">3학년</div>
      <div class="school-name">어진중</div>
      <div class="school-desc">토요보강<br>1~3주 · 9개교 기출</div>
      <span class="arrow">→</span>
    </a>

    <a href="goun3.html" class="card c3">
      <div class="school-grade">3학년</div>
      <div class="school-name">고운중</div>
      <div class="school-desc">토요보강<br>1~3주 · 9개교 기출</div>
      <span class="arrow">→</span>
    </a>

    <a href="jongchon1.html" class="card c4">
      <div class="school-grade">1학년</div>
      <div class="school-name">종촌중</div>
      <div class="school-desc">비상 황종배<br>L01~02 · 6개 섹션</div>
      <span class="arrow">→</span>
    </a>

    <a href="jongchon2.html" class="card c2">
      <div class="school-grade">2학년</div>
      <div class="school-name">종촌·어진중</div>
      <div class="school-desc">비바샘 A·B + 전국기출<br>관계대명사 · 최상급 · 143문항</div>
      <span class="arrow">→</span>
    </a>

  </div>

  <div class="footer">
    📸 채점 완료 후 결과 화면을 캡처해서 선생님께 제출하세요<br>
    ※ 본 시스템은 선생님이 제작한 학습 도구입니다
  </div>
</div>

<script>
  const petalsEl = document.getElementById('petals');
  const colors = ['#ffb7c5','#ffc8d5','#ff90a8','#ffd6e0','#ffaac0'];
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const size = Math.random() * 10 + 6;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${4+Math.random()*6}s;
      animation-delay:${Math.random()*6}s;
    `;
    petalsEl.appendChild(p);
  }
</script>
</body>
</html>
