<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>종촌중 1학년 OMR 채점</title>
<style>
  :root{--c1:#0ea5e9;--c1l:#e0f2fe;--c2:#10b981;--c2l:#d1fae5;--c3:#f59e0b;--c3l:#fef3c7;--c4:#ef4444;--c4l:#fee2e2;--ok:#16a34a;--okl:#dcfce7;--ng:#dc2626;--ngl:#fee2e2;--bg:#f1f5f9;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .hdr{background:linear-gradient(135deg,#0c4a6e,#0ea5e9,#10b981);color:#fff;padding:16px 16px 12px;text-align:center;box-shadow:0 4px 16px rgba(14,165,233,.3);}
  .hdr h1{font-size:1.1rem;font-weight:800;}
  .hdr p{font-size:.73rem;opacity:.8;margin-top:3px;}
  .tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07);}
  .tab{flex:1;padding:9px 3px;border:none;background:#fff;font-size:.64rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;line-height:1.3;text-align:center;transition:all .15s;}
  .tab.on[data-t="0"]{color:var(--c1);border-bottom-color:var(--c1);background:var(--c1l);}
  .tab.on[data-t="1"]{color:var(--c2);border-bottom-color:var(--c2);background:var(--c2l);}
  .tab.on[data-t="2"]{color:var(--c3);border-bottom-color:var(--c3);background:var(--c3l);}
  .tab.on[data-t="3"]{color:var(--c4);border-bottom-color:var(--c4);background:var(--c4l);}
  .panel{display:none;padding:13px 11px 90px;}
  .panel.on{display:block;}
  .sbar{background:#fff;border-radius:12px;padding:12px 15px;margin-bottom:13px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
  .sbar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
  .snum{font-size:1.05rem;font-weight:800;}.snum span{font-size:.72rem;font-weight:500;color:var(--muted);}
  .spct{font-size:.72rem;color:var(--muted);}
  .bout{height:8px;background:var(--border);border-radius:99px;overflow:hidden;}
  .bin{height:100%;border-radius:99px;transition:width .4s;width:0;}
  .p0 .bin{background:linear-gradient(90deg,var(--c1),#38bdf8);}
  .p1 .bin{background:linear-gradient(90deg,var(--c2),#34d399);}
  .p2 .bin{background:linear-gradient(90deg,var(--c3),#fbbf24);}
  .p3 .bin{background:linear-gradient(90deg,var(--c4),#f87171);}
  .sdet{font-size:.7rem;color:var(--muted);margin-top:5px;}
  .omrbox{background:#fff;border-radius:13px;padding:13px 11px;box-shadow:0 1px 5px rgba(0,0,0,.07);margin-bottom:11px;}
  .omrbox h3{font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--border);}
  .orow{display:flex;align-items:flex-start;padding:6px 0;border-bottom:1px solid #f8fafc;gap:5px;}
  .orow:last-child{border-bottom:none;}
  .qlbl{width:24px;font-size:.7rem;font-weight:700;color:var(--muted);flex-shrink:0;text-align:right;padding-top:5px;}
  .ricon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;flex-shrink:0;background:var(--border);color:var(--muted);margin-top:3px;}
  .ricon.ok{background:var(--okl);color:var(--ok);}
  .ricon.ng{background:var(--ngl);color:var(--ng);}
  .chs{display:flex;gap:5px;flex-wrap:wrap;padding-top:2px;}
  .cb{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:#fafafa;font-size:.82rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;}
  .cb:hover:not(:disabled){border-color:#93c5fd;background:#eff6ff;}
  .cb.sel{border-color:#3b82f6;background:#dbeafe;color:#1d4ed8;}
  .cb.sel.ok{border-color:var(--ok);background:var(--okl);color:var(--ok);}
  .cb.sel.ng{border-color:var(--ng);background:var(--ngl);color:var(--ng);}
  .cb:disabled{cursor:default;}
  .tfw{display:flex;gap:5px;padding-top:2px;}
  .multi-note{font-size:.65rem;font-weight:700;color:#7c3aed;margin-bottom:3px;}
  .sw{display:flex;gap:5px;align-items:center;flex:1;}
  .si{flex:1;min-width:0;padding:5px 7px;border:1.5px solid var(--border);border-radius:7px;font-size:.75rem;outline:none;}
  .si:focus{border-color:#3b82f6;}
  .si.ok{border-color:var(--ok);background:var(--okl);}
  .si.ng{border-color:var(--ng);background:var(--ngl);}
  .si:disabled{cursor:default;}
  .gbtn{padding:5px 9px;border:none;border-radius:7px;background:#3b82f6;color:#fff;font-size:.7rem;font-weight:700;cursor:pointer;white-space:nowrap;}
  .gbtn:disabled{background:var(--muted);cursor:default;}
  .ma{display:flex;flex-direction:column;gap:3px;flex:1;padding-top:2px;}
  .mr{display:flex;gap:3px;flex-wrap:wrap;}
  .msub{padding:4px 9px;border:none;border-radius:7px;background:#7c3aed;color:#fff;font-size:.68rem;font-weight:700;cursor:pointer;width:fit-content;margin-top:2px;}
  .msub:disabled{background:var(--muted);cursor:default;}
  .smwrap{display:flex;flex-direction:column;gap:4px;flex:1;}
  .smrow{display:flex;gap:5px;align-items:center;}
  .smlbl{font-size:.65rem;font-weight:700;color:var(--muted);white-space:nowrap;min-width:28px;}
  .tf4wrap{display:flex;flex-direction:column;gap:5px;flex:1;padding-top:2px;}
  .tf4row{display:flex;gap:6px;align-items:center;}
  .tf4lbl{font-size:.65rem;font-weight:700;color:var(--muted);white-space:nowrap;min-width:28px;}
  .tf4btns{display:flex;gap:3px;}
  .fw{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:200;}
  .fb{padding:12px 30px;border:none;border-radius:28px;font-size:.85rem;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.2);transition:transform .15s;}
  .fb:hover{transform:translateY(-2px);}
  .fb[data-ft="0"]{background:linear-gradient(135deg,var(--c1),#38bdf8);}
  .fb[data-ft="1"]{background:linear-gradient(135deg,var(--c2),#34d399);}
  .fb[data-ft="2"]{background:linear-gradient(135deg,var(--c3),#fbbf24);}
  .fb[data-ft="3"]{background:linear-gradient(135deg,var(--c4),#f87171);}
  .ov{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
  .ov.on{display:flex;}
  .mod{background:#fff;border-radius:18px;padding:26px 20px;max-width:310px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .me{font-size:2.6rem;margin-bottom:7px;}
  .mt{font-size:1.05rem;font-weight:800;margin-bottom:5px;}
  .ms{font-size:2.2rem;font-weight:900;margin:9px 0;}
  .ms.s{color:var(--ok);}.ms.w{color:#d97706;}.ms.d{color:var(--ng);}
  .mb{font-size:.77rem;color:var(--muted);margin-bottom:16px;}
  .mc{padding:10px 28px;border:none;border-radius:11px;background:#0ea5e9;color:#fff;font-size:.85rem;font-weight:700;cursor:pointer;}
  .attbar{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:9px;}
  .attbar span{font-size:.68rem;color:var(--muted);}
  .attbar strong{color:var(--c1);}
  .reset-btn{padding:4px 10px;border:1.5px solid #fca5a5;border-radius:20px;background:#fff;color:#dc2626;font-size:.68rem;font-weight:700;cursor:pointer;transition:all .15s;}
  .reset-btn:hover{background:#fee2e2;}
</style>
</head>
<body>
<div class="hdr">
  <h1>📋 종촌중 1학년 OMR 채점</h1>
  <p>비상 황종배 L1·L2·L3 + 25년 기출 | 풀어온 답을 입력하세요</p>
</div>
<div class="tabs">
  <button class="tab on" data-t="0" onclick="sw(0)">Lesson 1<br><small>25문항</small></button>
  <button class="tab" data-t="1" onclick="sw(1)">Lesson 2<br><small>25문항</small></button>
  <button class="tab" data-t="2" onclick="sw(2)">Lesson 3<br><small>25문항</small></button>
  <button class="tab" data-t="3" onclick="sw(3)">25년 기출<br><small>26문항</small></button>
</div>
<div class="panel on p0" id="p0">
  <div class="attbar"><span>도전 횟수: <strong id="at0">0</strong>회</span><button class="reset-btn" onclick="resetTab(0)">🔄 초기화</button></div>
  <div class="sbar"><div class="sbar-top"><div class="snum" id="sn0">0 <span>/ 25</span></div><div class="spct" id="sp0">0%</div></div><div class="bout"><div class="bin" id="bn0"></div></div><div class="sdet" id="sd0">답을 입력하고 채점해보세요</div></div>
  <div id="omr0"></div>
</div>
<div class="panel p1" id="p1">
  <div class="attbar"><span>도전 횟수: <strong id="at1">0</strong>회</span><button class="reset-btn" onclick="resetTab(1)">🔄 초기화</button></div>
  <div class="sbar"><div class="sbar-top"><div class="snum" id="sn1">0 <span>/ 25</span></div><div class="spct" id="sp1">0%</div></div><div class="bout"><div class="bin" id="bn1"></div></div><div class="sdet" id="sd1">답을 입력하고 채점해보세요</div></div>
  <div id="omr1"></div>
</div>
<div class="panel p2" id="p2">
  <div class="attbar"><span>도전 횟수: <strong id="at2">0</strong>회</span><button class="reset-btn" onclick="resetTab(2)">🔄 초기화</button></div>
  <div class="sbar"><div class="sbar-top"><div class="snum" id="sn2">0 <span>/ 25</span></div><div class="spct" id="sp2">0%</div></div><div class="bout"><div class="bin" id="bn2"></div></div><div class="sdet" id="sd2">답을 입력하고 채점해보세요</div></div>
  <div id="omr2"></div>
</div>
<div class="panel p3" id="p3">
  <div class="attbar"><span>도전 횟수: <strong id="at3">0</strong>회</span><button class="reset-btn" onclick="resetTab(3)">🔄 초기화</button></div>
  <div class="sbar"><div class="sbar-top"><div class="snum" id="sn3">0 <span>/ 26</span></div><div class="spct" id="sp3">0%</div></div><div class="bout"><div class="bin" id="bn3"></div></div><div class="sdet" id="sd3">답을 입력하고 채점해보세요</div></div>
  <div id="omr3"></div>
</div>
<div class="fw"><button class="fb" data-ft="0" id="fb" onclick="showResult()">📊 채점 결과 보기</button></div>
<div class="ov" id="ov">
  <div class="mod"><div class="me" id="me">🎉</div><div class="mt" id="mt">결과</div><div class="ms" id="msc"></div><div class="mb" id="mb"></div><button class="mc" onclick="closeOv()">확인</button></div>
</div>
<script>
const A=[
// L1
[
 {t:'mc',a:5},{t:'mc',a:4},{t:'short',a:['play']},{t:'mc',a:5},{t:'mc',a:1},
 {t:'mc',a:3},{t:'short',a:['c','ⓒ','have']},{t:'mc',a:4},{t:'multi',a:[4,5]},{t:'mc',a:5},
 {t:'short',a:["daniel doesn't have much money","daniel does not have much money"]},
 {t:'mc',a:5},
 {t:'short_multi',rows:['(1)','(2)'],a:[['b','ⓑ','is the singer famous in japan'],['c','ⓒ','does aria study in the library']]},
 {t:'mc',a:3},{t:'mc',a:2},{t:'short',a:['tie']},{t:'short',a:['wears wears tie','wears, wears, tie']},
 {t:'mc',a:4},{t:'mc',a:1},{t:'mc',a:4},{t:'multi',a:[3,5]},{t:'mc',a:5},
 {t:'mc',a:4},{t:'mc',a:2},{t:'tf4',a:['F','F','T','F']}
],
// L2
[
 {t:'mc',a:5},{t:'mc',a:3},{t:'short',a:['place']},{t:'mc',a:2},{t:'mc',a:1},
 {t:'mc',a:5},{t:'short',a:['there are three people in the picture','there are 3 people in the picture']},
 {t:'mc',a:4},{t:'mc',a:4},{t:'mc',a:4},
 {t:'short',a:['there is a small notebook in her pocket']},
 {t:'multi',a:[2,5]},
 {t:'short',a:['are paul and tyra talking on the phone','are paul and tyra talking on the phone?']},
 {t:'mc',a:5},{t:'mc',a:5},{t:'mc',a:5},
 {t:'short',a:['b','ⓑ','the writer is filming a video now']},
 {t:'mc',a:4},{t:'mc',a:2},{t:'mc',a:3},{t:'mc',a:3},{t:'mc',a:5},
 {t:'short',a:['there are one hundred candles on the cake','there are 100 candles on the cake','there are one hundred candles on the cake!']},
 {t:'mc',a:4},{t:'short',a:['candles']}
],
// L3
[
 {t:'mc',a:3},{t:'mc',a:2},{t:'short',a:['reporter']},{t:'mc',a:2},{t:'mc',a:5},
 {t:'multi',a:[1,5]},{t:'short',a:['horses sleep only about 3 hours a day','they sleep only about 3 hours a day','horses sleep only 3 hours a day']},
 {t:'mc',a:4},{t:'mc',a:3},{t:'mc',a:2},
 {t:'short',a:['did not bring','did, not, bring',"didn't bring"]},
 {t:'mc',a:3},{t:'short',a:['she cut her steak into small pieces']},
 {t:'short',a:['owner']},{t:'mc',a:5},{t:'mc',a:2},
 {t:'short',a:['he was sick']},
 {t:'mc',a:3},{t:'mc',a:2},{t:'mc',a:5},{t:'mc',a:3},{t:'mc',a:3},
 {t:'mc',a:5},{t:'mc',a:3},{t:'short',a:['he was next to the telephone','tommy was next to the telephone']}
],
// 기출
[
 {t:'mc',a:2},{t:'mc',a:1},{t:'mc',a:5},{t:'mc',a:1},{t:'mc',a:1},
 {t:'mc',a:3},{t:'mc',a:4},{t:'mc',a:5},{t:'mc',a:3},{t:'mc',a:4},
 {t:'mc',a:2},{t:'mc',a:5},{t:'mc',a:1},{t:'mc',a:4},{t:'mc',a:5},
 {t:'mc',a:2},{t:'mc',a:3},{t:'mc',a:3},{t:'mc',a:2},{t:'mc',a:3},
 {t:'mc',a:2},{t:'mc',a:5},{t:'mc',a:3},{t:'mc',a:4},{t:'mc',a:2},
 {t:'mc',a:4}
]
];

const TOTAL=[25,25,25,26];
const ATK=['jc1l0','jc1l1','jc1l2','jc1ex'];
let cur=0;
const sub=[{},{},{},{}];
const msel={};
const tf4st={};

function init(){
  [0,1,2,3].forEach(t=>{
    document.getElementById('at'+t).textContent=localStorage.getItem(ATK[t])||'0';
    buildOMR(t);
  });
  loadState();
  restoreUI();
  updFloat();
}

function buildOMR(t){
  const data=A[t];
  const el=document.getElementById('omr'+t);
  el.innerHTML='';
  const box=document.createElement('div');box.className='omrbox';
  const labels=['📘 Lesson 1 (25문항)','📗 Lesson 2 (25문항)','📙 Lesson 3 (25문항)','📝 2025년 종촌중 기출 (26문항)'];
  box.innerHTML=`<h3>${labels[t]}</h3>`;
  data.forEach((q,i)=>{
    const row=document.createElement('div');row.className='orow';row.id=`r${t}_${i}`;
    const lbl=document.createElement('div');lbl.className='qlbl';lbl.textContent=i+1;row.appendChild(lbl);
    const ic=document.createElement('div');ic.className='ricon';ic.id=`ic${t}_${i}`;ic.textContent='?';row.appendChild(ic);
    const ia=document.createElement('div');ia.style.flex='1';

    if(q.t==='mc'){
      const chs=document.createElement('div');chs.className='chs';
      '①②③④⑤'.split('').forEach((ch,ni)=>{
        const b=document.createElement('button');b.className='cb';b.textContent=ch;b.id=`cb${t}_${i}_${ni+1}`;b.onclick=()=>selMC(t,i,ni+1);chs.appendChild(b);
      });ia.appendChild(chs);
    }else if(q.t==='multi'){
      const note=document.createElement('div');note.className='multi-note';note.textContent='(모두 선택)';const ma=document.createElement('div');ma.className='ma';ma.appendChild(note);
      const mr=document.createElement('div');mr.className='mr';msel[`${t}_${i}`]=[];
      '①②③④⑤'.split('').forEach((ch,ni)=>{
        const b=document.createElement('button');b.className='cb';b.textContent=ch;b.id=`mc${t}_${i}_${ni+1}`;b.onclick=()=>togMulti(t,i,ni+1);mr.appendChild(b);
      });
      const ms=document.createElement('button');ms.className='msub';ms.textContent='선택 완료';ms.id=`ms${t}_${i}`;ms.onclick=()=>chkMulti(t,i);
      ma.appendChild(mr);ma.appendChild(ms);ia.appendChild(ma);
    }else if(q.t==='short'){
      const sw=document.createElement('div');sw.className='sw';
      const inp=document.createElement('input');inp.className='si';inp.type='text';inp.placeholder='정답 입력';inp.autocomplete='off';inp.spellcheck=false;inp.id=`si${t}_${i}`;inp.onkeydown=e=>{if(e.key==='Enter')chkShort(t,i);};
      const gb=document.createElement('button');gb.className='gbtn';gb.textContent='확인';gb.id=`gb${t}_${i}`;gb.onclick=()=>chkShort(t,i);
      sw.appendChild(inp);sw.appendChild(gb);ia.appendChild(sw);
    }else if(q.t==='short_multi'){
      const wrap=document.createElement('div');wrap.className='smwrap';
      q.rows.forEach((lbl2,si)=>{
        const r2=document.createElement('div');r2.className='smrow';
        const tag=document.createElement('span');tag.className='smlbl';tag.textContent=lbl2;
        const inp=document.createElement('input');inp.className='si';inp.type='text';inp.placeholder='입력';inp.autocomplete='off';inp.spellcheck=false;inp.id=`si${t}_${i}_${si}`;inp.onkeydown=e=>{if(e.key==='Enter')chkShortMulti(t,i);};
        r2.appendChild(tag);r2.appendChild(inp);wrap.appendChild(r2);
      });
      const gb=document.createElement('button');gb.className='gbtn';gb.textContent='확인';gb.id=`gb${t}_${i}`;gb.onclick=()=>chkShortMulti(t,i);
      wrap.appendChild(gb);ia.appendChild(wrap);
    }else if(q.t==='tf4'){
      const wrap=document.createElement('div');wrap.className='tf4wrap';
      tf4st[`${t}_${i}`]={};
      q.a.forEach((_,si)=>{
        const r2=document.createElement('div');r2.className='tf4row';
        const tag=document.createElement('span');tag.className='tf4lbl';tag.textContent='('+String(si+1)+')';
        const btns=document.createElement('div');btns.className='tf4btns';
        ['T','F'].forEach(v=>{
          const b=document.createElement('button');b.className='cb';b.textContent=v;b.style.width='32px';b.id=`tf4${t}_${i}_${si}_${v}`;b.onclick=()=>selTF4(t,i,si,v);btns.appendChild(b);
        });
        r2.appendChild(tag);r2.appendChild(btns);wrap.appendChild(r2);
      });
      ia.appendChild(wrap);
    }
    row.appendChild(ia);box.appendChild(row);
  });
  el.appendChild(box);
}

function selMC(t,i,n){
  if(sub[t][i]!==undefined)return;
  '①②③④⑤'.split('').forEach((_,x)=>{const b=document.getElementById(`cb${t}_${i}_${x+1}`);if(b)b.classList.toggle('sel',x+1===n);});
  const ok=(n===A[t][i].a);
  mark(t,i,ok);
  const btn=document.getElementById(`cb${t}_${i}_${n}`);if(btn)btn.classList.add(ok?'ok':'ng');
  '①②③④⑤'.split('').forEach((_,x)=>{const b=document.getElementById(`cb${t}_${i}_${x+1}`);if(b)b.disabled=true;});
  updScore(t);
}

function togMulti(t,i,n){
  if(sub[t][i]!==undefined)return;
  const k=`${t}_${i}`;const arr=msel[k];const b=document.getElementById(`mc${t}_${i}_${n}`);
  if(arr.includes(n)){msel[k]=arr.filter(x=>x!==n);if(b)b.classList.remove('sel');}else{arr.push(n);if(b)b.classList.add('sel');}
}

function chkMulti(t,i){
  if(sub[t][i]!==undefined)return;
  const sel=[...msel[`${t}_${i}`]].sort((a,b)=>a-b);const ans=[...A[t][i].a].sort((a,b)=>a-b);
  const ok=JSON.stringify(sel)===JSON.stringify(ans);
  '①②③④⑤'.split('').forEach((_,x)=>{const b=document.getElementById(`mc${t}_${i}_${x+1}`);if(b){b.disabled=true;if(sel.includes(x+1))b.classList.add(ok?'ok':'ng');}});
  const ms=document.getElementById(`ms${t}_${i}`);if(ms)ms.disabled=true;
  mark(t,i,ok);updScore(t);
}

function chkShort(t,i){
  if(sub[t][i]!==undefined)return;
  const inp=document.getElementById(`si${t}_${i}`);const val=inp.value.trim().toLowerCase();if(!val)return;
  const ans=A[t][i].a;
  const ok=ans.some(a=>val===a.toLowerCase()||val.includes(a.toLowerCase())||a.toLowerCase().includes(val));
  inp.disabled=true;inp.classList.add(ok?'ok':'ng');
  const gb=document.getElementById(`gb${t}_${i}`);if(gb)gb.disabled=true;
  mark(t,i,ok);updScore(t);
}

function chkShortMulti(t,i){
  if(sub[t][i]!==undefined)return;
  const q=A[t][i];
  const results=q.a.map((ans,si)=>{
    const inp=document.getElementById(`si${t}_${i}_${si}`);const val=(inp?inp.value.trim().toLowerCase():'');
    const ok=ans.some(a=>val===a.toLowerCase()||val.includes(a.toLowerCase())||a.toLowerCase().includes(val));
    if(inp){inp.disabled=true;inp.classList.add(ok?'ok':'ng');}return ok;
  });
  const gb=document.getElementById(`gb${t}_${i}`);if(gb)gb.disabled=true;
  mark(t,i,results.every(v=>v));updScore(t);
}

function selTF4(t,i,si,v){
  const key=`${t}_${i}`;
  if(tf4st[key][si]!==undefined)return;
  tf4st[key][si]=v;
  const correct=(v===A[t][i].a[si]);
  ['T','F'].forEach(x=>{const b=document.getElementById(`tf4${t}_${i}_${si}_${x}`);if(b){b.disabled=true;if(x===v){b.classList.add('sel');b.classList.add(correct?'ok':'ng');}}});
  if(Object.keys(tf4st[key]).length===A[t][i].a.length){
    const allOk=A[t][i].a.every((_,idx)=>tf4st[key][idx]===A[t][i].a[idx]);
    mark(t,i,allOk);updScore(t);
  }
}

function mark(t,i,ok){
  sub[t][i]=ok;
  saveState(t);
  const ic=document.getElementById(`ic${t}_${i}`);if(ic){ic.textContent=ok?'O':'X';ic.className='ricon '+(ok?'ok':'ng');}
  updFloat();
}

function updScore(t){
  const total=TOTAL[t];const done=Object.keys(sub[t]).length;const correct=Object.values(sub[t]).filter(v=>v).length;const pct=done>0?Math.round(correct/done*100):0;
  document.getElementById('sn'+t).innerHTML=`${correct} <span>/ ${total}</span>`;
  document.getElementById('sp'+t).textContent=pct+'%';
  document.getElementById('bn'+t).style.width=(done/total*100)+'%';
  document.getElementById('sd'+t).textContent=`응답 ${done}/${total} · 정답 ${correct}개 · 오답 ${done-correct}개`;
}

function updFloat(){
  const fb=document.getElementById('fb');const done=Object.keys(sub[cur]).length;
  fb.setAttribute('data-ft',cur);fb.textContent=done>0?`📊 결과 보기 (${done}/${TOTAL[cur]}문항 응답)`:'📊 채점 결과 보기';
}

function resetTab(t){
  if(!confirm('이 탭의 모든 답을 초기화할까요?')) return;
  sub[t]={};
  tf4st[String(t)+'_'+Object.keys(tf4st).filter(k=>k.startsWith(t+'_')).forEach(k=>delete tf4st[k])];
  Object.keys(tf4st).filter(k=>k.startsWith(t+'_')).forEach(k=>delete tf4st[k]);
  localStorage.removeItem('ans_'+t);
  localStorage.removeItem('vals_'+t);
  buildOMR(t);
  updScore(t);
  updFloat();
}

function showResult(){
  const t=cur;const done=Object.keys(sub[t]).length;if(done===0){alert('먼저 답을 입력해주세요!');return;}
  const correct=Object.values(sub[t]).filter(v=>v).length;const pct=Math.round(correct/done*100);
  const att=(parseInt(localStorage.getItem(ATK[t])||'0')+1);localStorage.setItem(ATK[t],att);document.getElementById('at'+t).textContent=att;
  const emoji=pct>=90?'🏆':pct>=70?'😊':pct>=50?'🤔':'😅';
  const title=pct>=90?'훌륭해요!':pct>=70?'잘했어요!':pct>=50?'조금 더 노력해요!':'다시 도전해봐요!';
  const cls=pct>=70?'s':pct>=50?'w':'d';
  document.getElementById('me').textContent=emoji;document.getElementById('mt').textContent=title;
  document.getElementById('msc').className='ms '+cls;document.getElementById('msc').textContent=`${correct} / ${done}`;
  document.getElementById('mb').textContent=`정답률 ${pct}% · 미응답 ${TOTAL[t]-done}문항`;
  document.getElementById('ov').classList.add('on');
}

function closeOv(){document.getElementById('ov').classList.remove('on');}

function sw(t){
  cur=t;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',i===t));
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('on',i===t));
  updFloat();
}


function saveState(t){
  localStorage.setItem('ans_'+t, JSON.stringify(sub[t]));
  // 단답형 입력값도 저장
  const vals={};
  A[t].forEach((q,i)=>{
    if(q.t==='short'||q.t==='tf'){
      const el=document.getElementById('si'+t+'_'+i)||document.getElementById('tf'+t+'_'+i+'_T')||null;
      // 값은 sub에서 복원 가능, 별도 저장 필요 없음
    }
    if(q.t==='short'||q.t==='short2'||q.t==='short_multi'){
      const inp0=document.getElementById('si'+t+'_'+i);
      if(inp0) vals[i+'_0']=inp0.value;
      const inp1=document.getElementById('si'+t+'_'+i+'_0');
      if(inp1) vals[i+'_s0']=inp1.value;
      const inp2=document.getElementById('si'+t+'_'+i+'_1');
      if(inp2) vals[i+'_s1']=inp2.value;
    }
  });
  localStorage.setItem('vals_'+t, JSON.stringify(vals));
}

function loadState(){
  [0,1,2,3].forEach(t=>{
    const saved=localStorage.getItem('ans_'+t);
    if(saved){
      try{ sub[t]=JSON.parse(saved); }catch(e){}
    }
    const savedVals=localStorage.getItem('vals_'+t);
    if(savedVals){
      try{
        const vals=JSON.parse(savedVals);
        A[t].forEach((q,i)=>{
          if(vals[i+'_0']!==undefined){
            const inp=document.getElementById('si'+t+'_'+i);
            if(inp) inp.value=vals[i+'_0'];
          }
          if(vals[i+'_s0']!==undefined){
            const inp=document.getElementById('si'+t+'_'+i+'_0');
            if(inp) inp.value=vals[i+'_s0'];
          }
          if(vals[i+'_s1']!==undefined){
            const inp=document.getElementById('si'+t+'_'+i+'_1');
            if(inp) inp.value=vals[i+'_s1'];
          }
        });
      }catch(e){}
    }
  });
}

function restoreUI(){
  [0,1,2,3].forEach(t=>{
    if(!A[t]) return;
    Object.entries(sub[t]).forEach(([ii,ok])=>{
      const i=parseInt(ii);
      const q=A[t][i];if(!q)return;
      const ic=document.getElementById('ic'+t+'_'+i);
      if(ic){ic.textContent=ok?'O':'X';ic.className='ricon '+(ok?'ok':'ng');}
      if(q.t==='mc'||q.t==='ab'){
        const max=q.t==='ab'?2:5;
        const pfx=q.t==='ab'?'cb':'cb';
        for(let x=1;x<=max;x++){const b=document.getElementById(pfx+t+'_'+i+'_'+x);if(b)b.disabled=true;}
      }
      if(q.t==='multi'){
        for(let x=1;x<=5;x++){const b=document.getElementById('mc'+t+'_'+i+'_'+x);if(b)b.disabled=true;}
        const ms=document.getElementById('ms'+t+'_'+i);if(ms)ms.disabled=true;
      }
      if(q.t==='short'||q.t==='short2'||q.t==='short_multi'){
        const inp=document.getElementById('si'+t+'_'+i);
        if(inp){inp.disabled=true;inp.classList.add(ok?'ok':'ng');}
        ['_0','_1'].forEach(s=>{
          const inp2=document.getElementById('si'+t+'_'+i+s);
          if(inp2){inp2.disabled=true;}
        });
        const gb=document.getElementById('gb'+t+'_'+i);if(gb)gb.disabled=true;
      }
      if(q.t==='tf'){
        ['T','F'].forEach(v=>{const b=document.getElementById('tf'+t+'_'+i+'_'+v);if(b)b.disabled=true;});
      }
      if(q.t==='tf4'){
        q.a.forEach((_,si)=>{
          ['T','F'].forEach(v=>{const b=document.getElementById('tf4'+t+'_'+i+'_'+si+'_'+v);if(b)b.disabled=true;});
        });
      }
    });
    updScore(t);
  });
}

init();
</script>
</body>
</html>
