function selMC(t,i,n){

  '①②③④⑤'.split('').forEach((_,x)=>{ const b=document.getElementById(`cb${t}_${i}_${x+1}`); if(b)b.classList.toggle('sel',x+1===n); });

}
function togMulti(t,i,n){
  if(submitted[t])return;
  const k=`${t}_${i}`; const arr=msel[k]||[]; msel[k]=arr;
  const b=document.getElementById(`mc${t}_${i}_${n}`);
  if(arr.includes(n)){ msel[k]=arr.filter(x=>x!==n); if(b)b.classList.remove('sel'); }
  else { arr.push(n); if(b)b.classList.add('sel'); }
  saveState(t); updScore(t); updFloat();
}

function revealTch(t,i){

  const rb=document.getElementById(`rv${t}_${i}`); if(rb) rb.style.display='none';

function selfTch(t,i,ok){
  revealTch(t,i);

}

function isAnswered(t,i){
  const q=A[t][i];
  if(q.t==='mc') return picks[t][i]!==undefined;
  if(q.t==='multi') return (msel[`${t}_${i}`]||[]).length>0;
  if(q.t==='short'){ const inp=document.getElementById(`si${t}_${i}`); return !!(inp&&inp.value.trim()); }
  if(q.t==='tch') return subT[t][i]!==undefined;

      const n=picks[t][i], cor=q.a;
      '①②③④⑤'.split('').forEach((_,x)=>{ const b=document.getElementById(`cb${t}_${i}_${x+1}`); if(!b)return; b.disabled=true; b.classList.remove('sel'); if(x+1===cor)b.classList.add('ok'); if(n!==undefined&&x+1===n&&n!==cor)b.classList.add('ng'); });
      if(n!==undefined){ const ok=n===cor; sub[t][i]=ok; if(ic){ic.textContent=ok?'O':'X'; ic.className='ricon '+(ok?'ok':'ng');} }
      else if(ic){ ic.textContent='-'; ic.className='ricon'; }
    } else if(q.t==='multi'){
      const sel=[...(msel[`${t}_${i}`]||[])].sort((a,b)=>a-b); const ans=[...q.a].sort((a,b)=>a-b); const has=sel.length>0; const ok=has&&JSON.stringify(sel)===JSON.stringify(ans);
      '①②③④⑤'.split('').forEach((_,x)=>{ const b=document.getElementById(`mc${t}_${i}_${x+1}`); if(!b)return; b.disabled=true; b.classList.remove('sel'); if(ans.includes(x+1))b.classList.add('ok'); if(sel.includes(x+1)&&!ans.includes(x+1))b.classList.add('ng'); });
      if(has){ sub[t][i]=ok; if(ic){ic.textContent=ok?'O':'X'; ic.className='ricon '+(ok?'ok':'ng');} }
      else if(ic){ ic.textContent='-'; ic.className='ricon'; }
    } else if(q.t==='short'){
      const inp=document.getElementById(`si${t}_${i}`); const val=inp?inp.value.trim().toLowerCase():'';
      if(inp)inp.disabled=true;
      if(val){ const ok=q.a.some(a=>val===a.toLowerCase()||val.includes(a.toLowerCase())||a.toLowerCase().includes(val)); sub[t][i]=ok; if(inp)inp.classList.add(ok?'ok':'ng'); if(ic){ic.textContent=ok?'O':'X'; ic.className='ricon '+(ok?'ok':'ng');} }
      else if(ic){ ic.textContent='-'; ic.className='ricon'; }
    } else if(q.t==='tch'){
      revealTch(t,i);
    }
  });
}

function submitTab(){
  const t=cur;
  if(submitted[t]){ showResult(); return; }
  const ans=countAnswered(t);
  if(ans===0){ alert('먼저 답을 입력해주세요!'); return; }
  if(ans<TOTAL[t] && !confirm('아직 '+(TOTAL[t]-ans)+'문항이 비어 있어요. 제출하고 채점할까요?')) return;
  submitted[t]=true;
  gradeTab(t);
  const att=parseInt(localStorage.getItem(keyS(t))||'0')+1; localStorage.setItem(keyS(t),att); document.getElementById('at'+t).textContent=att;
  saveState(t); updScore(t); updFloat(); showResult();
}

function updScore(t){
  const total=TOTAL[t]; const ans=countAnswered(t); const correct=Object.values(sub[t]).filter(v=>v).length+Object.values(subT[t]).filter(v=>v).length; const g=submitted[t];
  document.getElementById('sn'+t).innerHTML=`${g?correct:ans} <span>/ ${total}</span>`;
  document.getElementById('sp'+t).textContent=(g?(ans>0?Math.round(correct/ans*100):0):Math.round(ans/total*100))+'%';
  document.getElementById('bn'+t).style.width=(ans/total*100)+'%';
  document.getElementById('sd'+t).textContent= g?`정답 ${correct}개 · 오답 ${ans-correct}개 · 미응답 ${total-ans}개`:`입력 ${ans}/${total}문항`;
}

function updFloat(){
  const fb=document.getElementById('fb'); fb.className='fb k'+(cur%4);
  if(submitted[cur]){ fb.textContent='📊 결과 다시 보기'; }
  else { const ans=countAnswered(cur); fb.textContent=ans>0?`✅ 제출하고 채점 (${ans}/${TOTAL[cur]})`:'✅ 제출하고 채점'; }
}

function resetTab(t){
  if(!confirm('이 탭의 모든 답을 초기화할까요?')) return;
  picks[t]={}; submitted[t]=false; sub[t]={}; subT[t]={};
  Object.keys(msel).filter(k=>k.startsWith(t+'_')).forEach(k=>msel[k]=[]);
  localStorage.removeItem(keyD(t));
  buildOMR(t); updScore(t); updFloat();
}

function showResult(){
  const t=cur; if(!submitted[t]){ submitTab(); return; }
  const done=Object.keys(sub[t]).length+Object.keys(subT[t]).length;
  const correct=Object.values(sub[t]).filter(v=>v).length+Object.values(subT[t]).filter(v=>v).length; const pct=done>0?Math.round(correct/done*100):0;
  const emoji=pct>=90?'🏆':pct>=70?'😊':pct>=50?'🤔':'😅';
  const title=pct>=90?'훌륭해요!':pct>=70?'잘했어요!':pct>=50?'조금 더 노력해요!':'다시 도전해봐요!';
  const cls=pct>=70?'s':pct>=50?'w':'d';
  document.getElementById('me').textContent=emoji; document.getElementById('mt').textContent=title;
  document.getElementById('msc').className='ms '+cls; document.getElementById('msc').textContent=`${correct} / ${done}`;
  document.getElementById('mb').textContent=`정답률 ${pct}% · 미응답 ${TOTAL[t]-done}문항`;
  document.getElementById('ov').classList.add('on');
}
function closeOv(){ document.getElementById('ov').classList.remove('on'); }

function sw(t){
  cur=t;
  document.querySelectorAll('#tabs .tab').forEach((b,i)=>b.classList.toggle('on',i===t));
  document.querySelectorAll('#panels .panel').forEach((p,i)=>p.classList.toggle('on',i===t));
  updFloat();
}

function saveState(t){
  const shorts={};
  A[t].forEach((q,i)=>{ if(q.t==='short'){ const inp=document.getElementById(`si${t}_${i}`); if(inp)shorts[i]=inp.value; } });
  const multi={}; Object.keys(msel).filter(k=>k.startsWith(t+'_')).forEach(k=>multi[k]=msel[k]);
  localStorage.setItem(keyD(t), JSON.stringify({picks:picks[t], multi, shorts, submitted:submitted[t], subT:subT[t]}));
}
function loadState(){
  A.forEach((_,t)=>{
    const raw=localStorage.getItem(keyD(t)); if(!raw)return;
    let st; try{ st=JSON.parse(raw); }catch(e){ return; }
    if(st.picks){ picks[t]=st.picks; Object.entries(st.picks).forEach(([i,n])=>{ const b=document.getElementById(`cb${t}_${i}_${n}`); if(b)b.classList.add('sel'); }); }
    if(st.multi){ Object.entries(st.multi).forEach(([k,arr])=>{ msel[k]=arr.slice(); arr.forEach(n=>{ const b=document.getElementById(`mc${k}_${n}`); if(b)b.classList.add('sel'); }); }); }
    if(st.shorts){ Object.entries(st.shorts).forEach(([i,v])=>{ const inp=document.getElementById(`si${t}_${i}`); if(inp)inp.value=v; }); }
    if(st.subT){ subT[t]=st.subT; Object.entries(st.subT).forEach(([i,ok])=>{ revealTch(t,Number(i)); const bo=document.getElementById(`oxo${t}_${i}`), bx=document.getElementById(`oxx${t}_${i}`); if(bo)bo.classList.toggle('on',ok); if(bx)bx.classList.toggle('on',!ok); const ic=document.getElementById(`ic${t}_${i}`); if(ic){ic.textContent=ok?'O':'X'; ic.className='ricon '+(ok?'ok':'ng');} }); }
    submitted[t]=!!st.submitted;
  });
}
renderWeek(2);
</script>
